name: High-frequency data update

on:
  schedule:
    # Runs every 15 minutes from 03:15 to 11:00 UTC (8:45 AM to 4:30 PM IST)
    # Mon-Fri (1-5)
    - cron: '15,30,45 3 * * 1-5'
    - cron: '*/15 4-10 * * 1-5'
    - cron: '0 11 * * 1-5'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install pandas numpy yfinance requests scipy --quiet

      - name: Run data updater
        run: |
          python data_updater.py

      - name: Commit and push updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          # Only commit if something changed
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit"
          else
            IST_TIME=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
            git commit -m "data: auto-update ${IST_TIME}"
            git push
            echo "Pushed updated CSVs at ${IST_TIME}"
          fi
